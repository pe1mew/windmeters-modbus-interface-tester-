; PlatformIO project for the Windmeters Modbus Interface Tester
; Target: M5Stack AtomS3 (ESP32-S3) + Atomic RS485 Base
; See design/scratchbook.md and design/completeRealisationPlan.md for the full design.

[platformio]
default_envs = windmeterTester

[env]
upload_speed = 1500000
monitor_speed = 115200
build_flags = -DCORE_DEBUG_LEVEL=5

; -----------------------------------------------------------------------------
; windmeterTester — target hardware build
;
; RS485 base confirmed on the bench: RX = G5, TX = G6 (see scratchbook.md §4).
; No DE/RE GPIO — the Atomic RS485 Base auto-directions in hardware.
;
; platform/framework live here, not in the shared [env] above, so [env:native]
; below doesn't inherit an Arduino framework it can't use (same reason
; drivers/modBus's platformio.ini in greenhouse-Controller keeps [env] empty
; of platform/framework).
; -----------------------------------------------------------------------------
[env:windmeterTester]
platform = espressif32@6.3.2
framework = arduino
board = m5stack-atoms3
board_build.filesystem = spiffs
; AtomS3's board manifest sets ARDUINO_USB_MODE=1 but leaves
; ARDUINO_USB_CDC_ON_BOOT unset (0) — without this, Serial maps to UART0
; (not wired to anything on this board) instead of the native USB-CDC port
; used for flashing. Found by flashing and getting silence after the ROM
; bootloader's own output; confirmed fixed by adding this flag.
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    fastled/FastLED                 ; drives the onboard WS2812 RGB LED at GPIO35
    ESP32Async/ESPAsyncWebServer     ; TASK-WEB: HTTP + WebSocket server
    ESP32Async/AsyncTCP              ; ESPAsyncWebServer's transport dependency
    bblanchon/ArduinoJson            ; parsing POST bodies (web_core.h builds outgoing JSON manually)

; -----------------------------------------------------------------------------
; native — host-side unit tests (no hardware required)
;
; Compiles lib/mb_core against a mock transport so the protocol logic (CRC16,
; frame build/parse, timeout/retry) can be exercised on the developer's PC.
; NATIVE_TEST selects the mock transport instead of the real Serial2 one.
; build_src_filter excludes src/ (main.cpp is Arduino-only) and instead pulls
; in the test dir's mock + include_lib.cpp; include_lib.cpp #includes
; mb_frame.cpp/mb_core.cpp directly rather than relying on lib_deps, mirroring
; drivers/modBus's workaround in greenhouse-Controller for a PlatformIO 6
; Windows lock-file bug with self-referencing lib_deps. Verified working:
; `pio test -e native` — 17/17 passed.
;
; Run with:  pio test -e native
; -----------------------------------------------------------------------------
[env:native]
platform = native
build_flags = -DUNIT_TEST -DNATIVE_TEST
test_framework = unity
test_filter = test_mb_core, test_mb_log, test_led_status, test_cfg, test_mb_master, test_wifi_manager, test_ntp_manager, test_bus_scan, test_wind_poll, test_web_core
extra_scripts = pre:set_compiler.py
build_src_filter =
    -<*>
    +<../test/test_mb_core/mock_transport.cpp>
    +<../test/test_mb_core/include_lib.cpp>
